name: Deploy to EC2

on:
  push:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd ~/test-autowash
            git pull

            cd backend
            ./mvnw clean package -DskipTests
            sudo systemctl restart autowash-backend

            cd ../frontend
            npm install --silent
            npm run build
            sudo systemctl restart autowash-frontend

            echo "✅ Deploy complete"
